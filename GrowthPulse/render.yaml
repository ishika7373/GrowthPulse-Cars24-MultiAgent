# Render.com Blueprint for GrowthPulse v1.
# https://render.com/docs/blueprint-spec
#
# Set GOOGLE_API_KEY (or GEMINI_API_KEY) in the Render dashboard under the
# service's Environment tab. It's marked sync:false so the secret is never
# written into git.

services:
  - type: web
    name: growthpulse-cars24
    runtime: python
    plan: free
    region: singapore
    branch: main
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.app:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GOOGLE_API_KEY
        sync: false                  # MUST be set manually in Render dashboard
      - key: GEMINI_MODEL
        value: "gemini-3.1-flash-lite-preview"
      - key: GEMINI_MODEL_FALLBACK
        value: "gemini-2.5-flash"
      - key: GROWTHPULSE_FORCE_MOCK
        value: "false"
